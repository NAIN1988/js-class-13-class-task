<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS class 13</title>
    <style>
        html,
        body {
            padding: 0;
            margin: 0;
            background-color: gray;
        }

        .container {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .containerin {
            border: 1px solid black;
            padding: 20px;
            border-radius: 15px;
            width: 20%;
        }
    
.phone-frame {
    width: 300px;
    height: 600px;
    background: #111; 
    border-radius: 40px;
    border: 12px solid #222;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    margin: 50px auto;
    position: relative;
    padding: 15px;
    overflow: hidden;
}


.screen {
    background: white;
    width: 100%;
    height: 100%;
    border-radius: 25px;
    overflow-y: auto;
}


.phone-frame::after {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 25px;
    background: #222;
    border-bottom-left-radius: 15px;
    border-bottom-right-radius: 15px;
}


.app-container {
    padding: 20px;
    text-align: center;
}

    </style>
</head>

<body>
    <div class="container">
        <div class="phone-frame">
  <div class="screen">
    <div class="app-container">
      <h1>To-Do List</h1>
      <div class="input-group">
        <input type="text" id="todoinput" placeholder="Add a new task">
        <button id="addBtn">Add</button>
      </div>
      <ul id="todoList"></ul>
    </div>
  </div>
</div>

    </div>
</body>
<script src="script.js"></script>
</html>
